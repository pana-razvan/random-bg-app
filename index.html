<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping List</title>
    <style>
        * { box-sizing: border-box; }
        body {
            max-width: 500px;
            margin: 2rem auto;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f3f4f6;
            color: #111;
            padding: 0 1rem;
        }
        h1 { font-size: 1.6rem; margin-bottom: 0.5rem; }
        .subtitle { color: #666; font-size: 0.9rem; margin-bottom: 1rem; }
        .input-row {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
        }
        input[type="text"], input[type="number"] {
            padding: 0.6rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
        }
        input[name="item"] { flex: 1; }
        input[name="qty"] { width: 70px; }
        button {
            padding: 0.6rem 0.9rem;
            border: none;
            border-radius: 8px;
            background: #2563eb;
            color: white;
            font-size: 1rem;
            cursor: pointer;
        }
        button:hover { background: #1e40af; }
        button.danger { background: #ef4444; }
        button.danger:hover { background: #dc2626; }
        button.ghost { background: #e5e7eb; color: #111; }
        button.ghost:hover { background: #d1d5db; }
        .filters {
            display: flex;
            gap: 0.4rem;
            margin: 0.75rem 0 0.5rem;
        }
        .filters button { background: white; color: #333; border: 1px solid #ddd; }
        .filters button.active { background: #2563eb; color: white; border-color: #2563eb; }
        ul { list-style: none; padding: 0; margin: 0; }
        li {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            padding: 0.6rem 0.7rem;
            margin-bottom: 0.4rem;
        }
        li.done { opacity: 0.6; }
        li.done .item-name { text-decoration: line-through; }
        .item-name { flex: 1; }
        .item-meta { font-size: 0.8rem; color: #777; margin-right: 0.4rem; }
        .actions { display: flex; gap: 0.3rem; }
        .summary {
            margin-top: 1rem;
            font-size: 0.9rem;
            color: #444;
        }
        .empty {
            text-align: center;
            color: #888;
            padding: 1.5rem;
        }
    </style>
</head>
<body>
    <h1>🛒 Lista de cumpărături</h1>
    <p class="subtitle">Adaugă produse și marchează-le pe măsură ce le cumperi.</p>

    <form id="addForm" class="input-row">
        <input type="text" name="item" placeholder="Ex: Lapte, Pâine..." required>
        <input type="number" name="qty" placeholder="buc" min="1" value="1">
        <button type="submit">Adaugă</button>
    </form>

    <div class="filters">
        <button data-filter="all" class="active">Toate</button>
        <button data-filter="active">De cumpărat</button>
        <button data-filter="done">Cumparate</button>
    </div>

    <ul id="list"></ul>
    <div id="summary" class="summary"></div>
    <div style="margin-top:1rem;display:flex;gap:0.5rem;flex-wrap:wrap">
        <button id="clearDone" class="danger">Șterge achizițiile</button>
        <button id="clearAll" class="ghost">Golește lista</button>
        <button id="snapshot" class="ghost" style="background:#fef3c7;color:#92400e">📷 Salvează snapshot</button>
    </div>

    <details style="margin-top:1rem;background:white;border:1px solid #e5e7eb;border-radius:10px;padding:0.6rem 0.8rem">
        <summary><strong>Istoric liste</strong> <span id="historyCount" style="color:#666;font-size:0.85rem"></span></summary>
        <div id="history" style="margin-top:0.5rem"></div>
    </details>

    <script>
        const STORAGE_KEY = 'shopping-list-v1';
        const HISTORY_KEY = 'shopping-list-history-v1';
        const form = document.getElementById('addForm');
        const list = document.getElementById('list');
        const summary = document.getElementById('summary');
        const clearDone = document.getElementById('clearDone');
        const clearAll = document.getElementById('clearAll');
        const snapshotBtn = document.getElementById('snapshot');
        const historyEl = document.getElementById('history');
        const historyCount = document.getElementById('historyCount');
        const filterBtns = document.querySelectorAll('.filters button');

        let items = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        let filter = 'all';

        function save() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
            render();
        }

        function addItem(name, qty) {
            items.unshift({
                id: Date.now(),
                name: name.trim(),
                qty: Math.max(1, parseInt(qty) || 1),
                done: false,
                created: Date.now()
            });
            save();
        }

        function toggleItem(id) {
            const item = items.find(x => x.id === id);
            if (item) { item.done = !item.done; save(); }
        }

        function deleteItem(id) {
            items = items.filter(x => x.id !== id);
            save();
        }

        function updateName(id, newName) {
            const item = items.find(x => x.id === id);
            if (item) { item.name = newName.trim(); save(); }
        }

        function clearDoneItems() {
            items = items.filter(x => !x.done);
            save();
        }

        function clearAllItems() {
            if (confirm('Sigur ștergi toată lista?')) {
                items = [];
                save();
                saveHistory([]);
                renderHistory();
            }
        }

        function loadHistory() {
            return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
        }

        function saveHistory(history) {
            localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
        }

        function addSnapshot() {
            const history = loadHistory();
            const now = new Date();
            const label = now.toLocaleString('ro-RO');
            const entry = {
                id: now.toISOString(),
                label,
                items: JSON.parse(JSON.stringify(items))
            };
            history.unshift(entry);
            if (history.length > 20) history.length = 20; // keep max 20
            saveHistory(history);
            renderHistory();
        }

        function restoreSnapshot(id) {
            const history = loadHistory();
            const entry = history.find(h => h.id === id);
            if (!entry) return;
            if (!confirm(`Restorăm lista din ${entry.label}? Lista actuală va fi înlocuită.`)) return;
            items = JSON.parse(JSON.stringify(entry.items));
            save();
        }

        function deleteSnapshot(id) {
            const history = loadHistory().filter(h => h.id !== id);
            saveHistory(history);
            renderHistory();
        }

        function renderHistory() {
            const history = loadHistory();
            historyCount.textContent = history.length ? `(${history.length})` : '';
            if (history.length === 0) {
                historyEl.innerHTML = '<p style="color:#888;font-size:0.9rem">Nu există snapshots salvate.</p>';
                return;
            }
            historyEl.innerHTML = history.map(h => {
                const total = h.items.length;
                const done = h.items.filter(x => x.done).length;
                return `
                <div style="display:flex;align-items:center;justify-content:space-between;gap:0.5rem;padding:0.4rem 0;border-bottom:1px solid #f3f4f6">
                    <div>
                        <div style="font-weight:600">${escapeHtml(h.label)}</div>
                        <div style="font-size:0.8rem;color:#777">${done}/${total} cumpărate</div>
                    </div>
                    <div style="display:flex;gap:0.3rem">
                        <button class="ghost" data-history="restore" data-id="${h.id}">Restore</button>
                        <button class="danger" data-history="delete" data-id="${h.id}">✕</button>
                    </div>
                </div>`;
            }).join('');
        }

        function render() {
            const filtered = items.filter(item => {
                if (filter === 'active') return !item.done;
                if (filter === 'done') return item.done;
                return true;
            });

            if (filtered.length === 0) {
                list.innerHTML = '<li class="empty">Lista este goală</li>';
            } else {
                list.innerHTML = filtered.map(item => `
                    <li class="${item.done ? 'done' : ''}">
                        <input type="checkbox" ${item.done ? 'checked' : ''} data-action="toggle" data-id="${item.id}">
                        <span class="item-name" data-action="rename" data-id="${item.id}" title="Dublu-click pentru editare">${escapeHtml(item.name)}</span>
                        <span class="item-meta">×${item.qty}</span>
                        <div class="actions">
                            <button class="danger" data-action="delete" data-id="${item.id}">✕</button>
                        </div>
                    </li>
                `).join('');
            }

            const total = items.length;
            const done = items.filter(x => x.done).length;
            summary.textContent = total === 0
                ? ''
                : `${done}/${total} produse cumpărate`;

            clearDone.style.display = done > 0 ? 'inline-block' : 'none';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Event delegation
        list.addEventListener('click', (e) => {
            const btn = e.target.closest('[data-action]');
            if (!btn) return;
            const id = Number(btn.dataset.id);
            const action = btn.dataset.action;
            if (action === 'toggle') toggleItem(id);
            if (action === 'delete') deleteItem(id);
        });

        list.addEventListener('dblclick', (e) => {
            const span = e.target.closest('[data-action="rename"]');
            if (!span) return;
            const id = Number(span.dataset.id);
            const item = items.find(x => x.id === id);
            if (!item) return;
            const newName = prompt('Editează produs:', item.name);
            if (newName !== null && newName.trim()) updateName(id, newName);
        });

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const data = new FormData(form);
            const name = data.get('item');
            const qty = data.get('qty');
            if (!name.trim()) return;
            addItem(name, qty);
            form.reset();
        });

        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                filter = btn.dataset.filter;
                render();
            });
        });

        clearDone.addEventListener('click', clearDoneItems);
        clearAll.addEventListener('click', clearAllItems);
        snapshotBtn.addEventListener('click', addSnapshot);

        historyEl.addEventListener('click', (e) => {
            const btn = e.target.closest('[data-history]');
            if (!btn) return;
            const id = btn.dataset.history === 'delete' ? btn.dataset.id : btn.dataset.id;
            if (btn.dataset.history === 'restore') restoreSnapshot(id);
            if (btn.dataset.history === 'delete') deleteSnapshot(id);
        });

        renderHistory();
        render();
    </script>
</body>
</html>
